<!DOCTYPE html>
<html lang="it">
<head>
    <title>Admin</title>
    <style>
        * { font-family: 'Century Gothic', CenturyGothic, AppleGothic, sans-serif !important; }
    </style>
</head>
<body>
    <h1>Pagina admin</h1>

    <form action="{{ url_for('admin.add_product') }}" method="POST">
        <input type="number" name="id" placeholder="ID"><br>
        <input type="text" name="nome_prodotto" placeholder="Nome prodotto"><br>
        <input type="number" name="prezzo" placeholder="Prezzo"><br>
        <input type="number" name="margine" placeholder="Margine"><br>
        <input type="number" name="prezzo_interno" placeholder="Prezzo interno"><br>
        <button type="submit">Aggiungi prodotto</button>
    </form>

</body>
</html>
