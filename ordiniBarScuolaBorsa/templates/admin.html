<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestione Palmare - Full Edit Mode</title>
    <style>
        body { background-color: #8b0000; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; color: white; }
        .container { width: 98%; max-width: 1500px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background-color: black; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        /* Form Aggiunta Prodotto */
        .add-product-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #444; }
        input, select { background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; box-sizing: border-box; width: 100%; }
        label { font-size: 0.7em; color: #aaa; text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        table { border-collapse: collapse; width: 100%; color: white; }
        th { color: #ff0000; padding: 12px; text-transform: uppercase; font-size: 0.75em; border-bottom: 1px solid #333; text-align: center; }
        td { padding: 15px 10px; text-align: center; border-bottom: 1px solid #222; font-size: 0.85em; }
        .text-left { text-align: left; }

        .btn { padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; font-size: 0.7em; background: transparent; }
        .btn-add { background-color: #ff0000; color: white; border: none; }
        .btn-note { border: 1px solid #2196F3; color: #2196F3; }
        .btn-modifica { border: 1px solid #ff0000; color: #ff0000; margin-left: 5px; }
        .btn-del { border: 1px solid #555; color: #aaa; margin-left: 5px; padding: 8px 12px; }
        
        /* POP-UP */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        .modal-box { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background-color: #1a1a1a; padding: 25px; border-radius: 8px; z-index: 1000; 
            width: 750px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }
        
        .cat-section { margin-bottom: 15px; border-left: 3px solid #ff0000; padding-left: 15px; background: #222; padding: 10px; border-radius: 0 8px 8px 0; }
        .cat-name { color: #ff0000; font-size: 0.75em; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .cat-delete-x { color: #ff4444; font-size: 1.5em; cursor: pointer; font-weight: bold; padding: 0 5px; transition: 0.2s; }
        .cat-delete-x:hover { color: #ff0000; transform: scale(1.1); }

        .note-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .note-btn { background-color: #333; color: white; padding: 6px 10px; border-radius: 4px; font-size: 0.8em; display: flex; align-items: center; gap: 8px; border: 1px solid transparent; }
        .note-delete-x { color: #ff4444; font-size: 1.2em; cursor: pointer; font-weight: bold; }

        .add-note-inline { display: flex; gap: 5px; margin-top: 5px; }
        
        .edit-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .edit-form-grid div.full-width { grid-column: span 2; }
        
        .add-category-row { display: flex; gap: 10px; margin-bottom: 20px; background: #111; padding: 10px; border-radius: 6px; border: 1px dashed #444; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        
        <table>
            <thead>
                <tr>
                    <th class="text-left">NOME</th>
                    <th>COSTO</th>
                    <th>PREZZO EURO</th>
                    <th>PREZZO INTERNI</th>
                    <th>MARGINE</th>
                    <th>ATTIVO</th>
                    <th>CATEGORIA</th>
                    <th>AZIONI</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="add-product-form" style="margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; border-bottom: none;">
            <div>
                <input type="text" id="newNome" placeholder="Nome">
            </div>
            <div>
                <input type="number" id="newCosto" step="0.10" placeholder="Costo">
            </div>
            <div>
                <input type="number" id="newPrezzo" step="0.10" placeholder="Prezzo €">
            </div>
            <div>
                <input type="number" id="newInterni" step="0.10" placeholder="Interni">
            </div>
            <div>
                <input type="number" id="newMargine" step="0.10" placeholder="Margine">
            </div>
            <div>
                <input type="text" id="newAttivo" placeholder="Attivo" value="si">
            </div>
            <div>
                <input type="text" id="newCategoria" placeholder="Categoria">
            </div>
            <div style="display: flex; align-items: flex-start;">
                <button class="btn btn-add" style="width: 100%; height: 35px;" onclick="aggiungiNuovoProdotto()">AGGIUNGI</button>
            </div>
        </div>
    </div>
</div>

<div id="noteOverlay" class="overlay" onclick="chiudiNote()"></div>
<div id="noteBox" class="modal-box">
    <div style="font-size: 0.9em; margin-bottom:20px; border-bottom: 1px solid #333; padding-bottom: 10px;">
        GESTIONE VARIANTI PER: <span id="nTitoloNome" style="color:#2196F3; font-weight:bold;"></span>
    </div>
    
    <div class="add-category-row">
        <input type="text" id="nuovaCategoriaInput" placeholder="Nuova categoria (es. COTTURA, GUSTO...)" style="flex-grow: 1;">
        <button class="btn btn-add" style="background-color: #2196F3; white-space: nowrap;" onclick="aggiungiCategoria()">+ NUOVA CATEGORIA</button>
    </div>

    <div id="containerCategorie"></div>
    <button onclick="chiudiNote()" class="btn btn-add" style="width:100%; margin-top:20px; padding: 15px;">SALVA E ESCI</button>
</div>

<div id="editOverlay" class="overlay" onclick="chiudiModifica()"></div>
<div id="editBox" class="modal-box" style="width: 500px;">
    <div style="font-size: 0.9em; margin-bottom:20px; border-bottom: 1px solid #333; padding-bottom: 10px; color:#ff0000; font-weight:bold;">
        MODIFICA PRODOTTO
    </div>
    <div class="edit-form-grid">
        <div class="full-width">
            <label>Nome Prodotto</label>
            <input type="text" id="editNome">
        </div>
        <div>
            <label>Costo</label>
            <input type="number" id="editCosto" step="0.10">
        </div>
        <div>
            <label>Prezzo Euro</label>
            <input type="number" id="editPrezzo" step="0.10">
        </div>
        <div>
            <label>Prezzo Interni</label>
            <input type="number" id="editInterni" step="0.10">
        </div>
        <div>
            <label>Margine</label>
            <input type="number" id="editMargine" step="0.10">
        </div>
        <div>
            <label>Attivo</label>
            <input type="text" id="editAttivo">
        </div>
        <div>
            <label>Categoria</label>
            <input type="text" id="editCategoria">
        </div>
    </div>
    <button onclick="salvaModificheProdotto()" class="btn btn-add" style="width:100%; margin-top:10px; padding: 15px;">SALVA MODIFICHE</button>
</div>

<script>
    const initialData = [
        { id: 9, n: "cappuccino", c: "1", p: "1.5", i: "1", m: "0.5", a: "si", g: "bevanda", v: { "PREPARAZIONE": ["chiaro", "scuro"], "TEMPERATURA": ["tiepido", "bollente"], "SCHIUMA": ["tanta", "poca", "no schiuma"], "EXTRA": ["cacao", "cannella"] } },
        { id: 1, n: "espresso", c: "0.3", p: "1", i: "0.5", m: "0.7", a: "si", g: "bevanda", v: { "PREPARAZIONE": ["lungo", "ristretto"], "TEMPERATURA": ["bollente"], "SERVIZIO": ["in vetro"] } },
        { id: 70, n: "toast", c: "1.0", p: "2.5", i: "1.5", m: "1.5", a: "si", g: "cibo", v: { "COTTURA": ["ben cotto", "poco cotto"], "MODIFICA": ["solo prosciutto", "solo formaggio"] } }
    ];

    let listino = JSON.parse(localStorage.getItem('listino_palmare_v4')) || initialData;
    let prodottoCorrente = null;

    function salvaDati() {
        localStorage.setItem('listino_palmare_v4', JSON.stringify(listino));
    }

    function formatNumber(num) {
        return parseFloat(num || 0).toString().replace('.', ',');
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        listino.forEach(d => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="text-left">${d.n}</td>
                <td>${formatNumber(d.c)}</td>
                <td>${formatNumber(d.p)}</td>
                <td>${formatNumber(d.i)}</td>
                <td>${formatNumber(d.m)}</td>
                <td>${d.a || 'si'}</td>
                <td>${d.g || '-'}</td>
                <td style="white-space: nowrap;">
                    <button class="btn btn-note" onclick='apriNote(${d.id})'>NOTE</button>
                    <button class="btn btn-modifica" onclick='apriModifica(${d.id})'>MODIFICA</button>
                    <button class="btn btn-del" onclick='eliminaProdotto(${d.id})'>X</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function aggiungiNuovoProdotto() {
        const nome = document.getElementById('newNome').value;
        const costo = document.getElementById('newCosto').value || "0";
        const prezzo = document.getElementById('newPrezzo').value || "0";
        const interni = document.getElementById('newInterni').value || "0";
        const margine = document.getElementById('newMargine').value || "0";
        const attivo = document.getElementById('newAttivo').value || "si";
        const categoria = document.getElementById('newCategoria').value || "-";

        if(!nome) { alert("Inserisci almeno il nome!"); return; }

        const nuovo = {
            id: Date.now(),
            n: nome, c: costo, p: prezzo, i: interni, m: margine, a: attivo, g: categoria,
            v: { "PREPARAZIONE": [], "TEMPERATURA": [], "EXTRA": [], "SERVIZIO": [] }
        };

        listino.push(nuovo);
        salvaDati();
        renderTable();
        
        document.querySelectorAll('.add-product-form input').forEach(input => {
            if(input.id !== 'newAttivo') input.value = '';
        });
    }

    function eliminaProdotto(id) {
        if(confirm("Eliminare definitivamente questo prodotto?")) {
            listino = listino.filter(p => p.id !== id);
            salvaDati();
            renderTable();
        }
    }

    function apriModifica(id) {
        prodottoCorrente = listino.find(p => p.id === id);
        
        document.getElementById('editNome').value = prodottoCorrente.n;
        document.getElementById('editCosto').value = prodottoCorrente.c;
        document.getElementById('editPrezzo').value = prodottoCorrente.p;
        document.getElementById('editInterni').value = prodottoCorrente.i;
        document.getElementById('editMargine').value = prodottoCorrente.m;
        document.getElementById('editAttivo').value = prodottoCorrente.a;
        document.getElementById('editCategoria').value = prodottoCorrente.g;

        document.getElementById('editOverlay').style.display = 'block';
        document.getElementById('editBox').style.display = 'block';
    }

    function salvaModificheProdotto() {
        if(!prodottoCorrente) return;

        prodottoCorrente.n = document.getElementById('editNome').value;
        prodottoCorrente.c = document.getElementById('editCosto').value || "0";
        prodottoCorrente.p = document.getElementById('editPrezzo').value || "0";
        prodottoCorrente.i = document.getElementById('editInterni').value || "0";
        prodottoCorrente.m = document.getElementById('editMargine').value || "0";
        prodottoCorrente.a = document.getElementById('editAttivo').value || "si";
        prodottoCorrente.g = document.getElementById('editCategoria').value || "-";

        salvaDati();
        renderTable();
        chiudiModifica();
    }

    function chiudiModifica() {
        document.getElementById('editOverlay').style.display = 'none';
        document.getElementById('editBox').style.display = 'none';
    }

    // --- LOGICA GESTIONE NOTE E CATEGORIE ---
    function apriNote(id) {
        prodottoCorrente = listino.find(p => p.id === id);
        document.getElementById('nTitoloNome').innerText = prodottoCorrente.n.toUpperCase();
        document.getElementById('nuovaCategoriaInput').value = ''; 
        aggiornaUINote();
        document.getElementById('noteOverlay').style.display = 'block';
        document.getElementById('noteBox').style.display = 'block';
    }

    function aggiornaUINote() {
        const cont = document.getElementById('containerCategorie');
        cont.innerHTML = '';

        for (const [categoria, note] of Object.entries(prodottoCorrente.v)) {
            const sezione = document.createElement('div');
            sezione.className = 'cat-section';
            
            sezione.innerHTML = `
                <div class="cat-name">
                    <span>${categoria}</span>
                    <span class="cat-delete-x" onclick="eliminaCategoria('${categoria}')" title="Elimina Categoria">&times;</span>
                </div>
                <div class="note-grid" id="grid-${categoria}"></div>
                <div class="add-note-inline">
                    <input type="text" id="input-${categoria}" placeholder="Nuova nota per ${categoria}...">
                    <button class="btn btn-add" style="background-color:#4CAF50;" onclick="aggiungiNota('${categoria}')">+</button>
                </div>
            `;
            cont.appendChild(sezione);

            const grid = sezione.querySelector(`#grid-${categoria}`);
            note.forEach(nota => {
                const tag = document.createElement('div');
                tag.className = 'note-btn';
                tag.innerHTML = `
                    <span>${nota.toUpperCase()}</span>
                    <span class="note-delete-x" onclick="rimuoviNota('${categoria}', '${nota}')">&times;</span>
                `;
                grid.appendChild(tag);
            });
        }
    }

    function aggiungiCategoria() {
        const input = document.getElementById('nuovaCategoriaInput');
        let nomeCat = input.value.trim().toUpperCase();
        
        if(!nomeCat) return;

        if(!prodottoCorrente.v[nomeCat]) {
            prodottoCorrente.v[nomeCat] = [];
            salvaDati();
            aggiornaUINote();
            input.value = ''; 
        } else {
            alert("Questa categoria esiste già per questo prodotto!");
        }
    }

    // Funzione per eliminare l'intera categoria
    function eliminaCategoria(cat) {
        if(confirm(`Sei sicuro di voler eliminare l'intera categoria "${cat}" e tutte le sue note?`)) {
            delete prodottoCorrente.v[cat]; // Rimuove la chiave dall'oggetto
            salvaDati();
            aggiornaUINote();
        }
    }

    function aggiungiNota(cat) {
        const input = document.getElementById(`input-${cat}`);
        const valore = input.value.trim();
        if(!valore) return;

        if(!prodottoCorrente.v[cat].includes(valore)) {
            prodottoCorrente.v[cat].push(valore);
            salvaDati();
            aggiornaUINote();
        }
        input.value = '';
    }

    function rimuoviNota(cat, nota) {
        prodottoCorrente.v[cat] = prodottoCorrente.v[cat].filter(n => n !== nota);
        salvaDati();
        aggiornaUINote();
    }

    function chiudiNote() {
        document.getElementById('noteOverlay').style.display = 'none';
        document.getElementById('noteBox').style.display = 'none';
    }

    // Avvio
    renderTable();
</script>

</body>
</html>
