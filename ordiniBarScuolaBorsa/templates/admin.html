<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #fff; display: flex; justify-content: center; padding: 50px; }
        
        table { border-collapse: collapse; width: 100%; max-width: 950px; background-color: #141414; border: 1px solid #333; border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px rgba(255, 0, 0, 0.1); }
        
        th { background-color: #000; color: #ff0000; padding: 20px; text-align: left; text-transform: uppercase; font-size: 12px; border-bottom: 2px solid #ff0000; }
        
        td { padding: 15px 20px; border-bottom: 1px solid #222; vertical-align: middle; }
        
        tr:hover { background-color: #1a1a1a; }

        /* Stile Azioni */
        .actions-cell { display: flex; align-items: center; gap: 15px; }

        /* Pulsanti Testuali */
        .btn-text { background: none; border: 1px solid #444; color: #ccc; padding: 5px 10px; border-radius: 4px; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .btn-text.add { border-color: #ff0000; color: #ff0000; }
        .btn-text:hover { background-color: #fff; color: #000; border-color: #fff; }

        /* La FORMA del Cestino (Senza pulsante intorno) */
        .trash-icon { 
            color: #555; 
            font-size: 20px; 
            cursor: pointer; 
            transition: transform 0.2s, color 0.2s; 
            display: inline-block;
        }
        
        .trash-icon:hover { 
            color: #ff0000; 
            transform: scale(1.2) rotate(-5deg); /* Effetto movimento quando ci passi sopra */
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Costo</th>
                <th>Prezzi(euro)</th>
                <th>Prezzi(interni)</th>
                <th>Margine</th>
                <th>Attivo</th>
                <th>Categoria</th>
            </tr>
        </thead>
        <tbody>
            <!-- 5 Righe -->
            <tr>
                <td>#1</td><td>Brioche</td><td>€2.50</td><td>€2.00</td><td>20%</td><td>Sì</td><td>Pane</td>
                <td class="actions-cell">
                    <button class="btn-text add">Aggiungi</button>
                    <button class="btn-text">Modifica</button>
                    <i class="fa-solid fa-trash-can trash-icon" title="Elimina Definitivemente"></i>
                </td>
            </tr>
            <tr>
                <td>#2</td><td>Toast</td><td>€1.50</td><td>€1.20</td><td>20%</td><td>Sì</td><td>Pane</td>
                <td class="actions-cell">
                    <button class="btn-text add">Aggiungi</button>
                    <button class="btn-text">Modifica</button>
                    <i class="fa-solid fa-trash-can trash-icon" title="Elimina Definitivemente"></i>
                </td>
            </tr>
            <tr>
                <td>#3</td><td>Kebab</td><td>€5.00</td><td>€4.00</td><td>20%</td><td>Sì</td><td>Carne</td>
                <td class="actions-cell">
                    <button class="btn-text add">Aggiungi</button>
                    <button class="btn-text">Modifica</button>
                    <i class="fa-solid fa-trash-can trash-icon" title="Elimina Definitivemente"></i>
                </td>
            </tr>
            <tr>
                <td>#4</td><td>Cocacola</td><td>€1.50</td><td>€1.20</td><td>20%</td><td>Sì</td><td>Bibite</td>
                <td class="actions-cell">
                    <button class="btn-text add">Aggiungi</button>
                    <button class="btn-text">Modifica</button>
                    <i class="fa-solid fa-trash-can trash-icon" title="Elimina Definitivemente"></i>
                </td>
            </tr>
            <tr>
                <td>#5</td><td>Acqua</td><td>€1.00</td><td>€0.80</td><td>20%</td><td>Sì</td><td>Bibite </td>
                <td class="actions-cell">
                    <button class="btn-text add">Aggiungi</button>
                    <button class="btn-text">Modifica</button>
                    <i class="fa-solid fa-trash-can trash-icon" title="Elimina Definitivemente"></i>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
